<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診断レポート（専用）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 40%, #0f172a 100%);
      color: #f8fafc;
      min-height: 100dvh;
      padding: 24px 20px 40px;
      line-height: 1.75;
    }
    .card {
      max-width: 420px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px 22px;
      backdrop-filter: blur(12px);
    }
    h1 { font-size: 1.15rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
    .sub { font-size: 0.875rem; color: rgba(248,250,252,0.72); margin-bottom: 20px; }
    .status { font-size: 0.9rem; padding: 14px 16px; border-radius: 12px; margin-top: 16px; }
    .status.ok { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.35); color: #86efac; }
    .status.err { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .status.wait { background: rgba(255,255,255,0.06); color: rgba(248,250,252,0.85); }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2); margin-bottom: 12px;
    }
    .next { margin-top: 20px; font-size: 0.8rem; color: rgba(248,250,252,0.55); }
    a { color: #a5b4fc; }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    /** LINE Developers → LIFF アプリの LIFF ID（数字-英小文字）に差し替え */
    const LIFF_ID = '2009774828-fLas1Ciw';
  </script>
</head>
<body>
  <div class="card">
    <h1>診断レポート専用ページ</h1>
    <p class="sub">友だち追加時にお送りしたリンクからのみ、正しく開けます。</p>
    <div id="out"><p class="status wait">読み込み中…</p></div>
    <p class="next">ホームページ診断は <a href="/service/diagnosis.html">こちら</a> から実行できます。</p>
  </div>
  <script>
    (function () {
      const out = document.getElementById('out');

      function show(html) {
        out.innerHTML = html;
      }

      if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') {
        show('<p class="status err">LIFF_ID が未設定です。service/liff-line.html 内の LIFF_ID を編集してください。</p>');
        return;
      }

      /**
       * liff.login() の OAuth 復帰でクエリが消える＋ sessionStorage が引き継がれない環境があるため、
       * sessionStorage / localStorage / Cookie（SameSite=Lax）の3経路で専用トークンを退避する。
       */
      const LIFF_STATE_KEY = 'axer_liff_state_v1';
      const LIFF_STATE_COOKIE = 'axer_liff_s';

      function liffStateFromUrl() {
        const q = new URLSearchParams(window.location.search).get('liff.state');
        if (q) return q;
        const h = window.location.hash || '';
        if (h.indexOf('liff.state=') === -1) return null;
        try {
          return new URLSearchParams(h.replace(/^#/, '')).get('liff.state');
        } catch (e) {
          return null;
        }
      }

      /** liff.line.me/{LIFF_ID}/{token} から Endpoint に入った直後、referrer にトークンが残ることがある */
      function liffStateFromLiffLineReferrer() {
        try {
          const ref = document.referrer;
          if (!ref || ref.indexOf('liff.line.me') === -1) return null;
          const u = new URL(ref);
          const segments = u.pathname.split('/').filter(Boolean);
          if (segments.length < 2) return null;
          const lid = String(LIFF_ID || '');
          if (segments[0] === lid) {
            return segments.slice(1).join('/');
          }
          const i = segments.indexOf(lid);
          if (i !== -1 && segments[i + 1]) {
            return segments.slice(i + 1).join('/');
          }
          return segments.slice(1).join('/');
        } catch (e) {
          return null;
        }
      }

      function readStateCookie() {
        try {
          const m = document.cookie.match(
            new RegExp('(?:^|; )' + LIFF_STATE_COOKIE.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)')
          );
          return m ? decodeURIComponent(m[1]) : null;
        } catch (e) {
          return null;
        }
      }

      function persistLiffState(s) {
        if (!s || typeof s !== 'string' || s.length < 1) return;
        try {
          sessionStorage.setItem(LIFF_STATE_KEY, s);
        } catch (e) {}
        try {
          localStorage.setItem(LIFF_STATE_KEY, s);
        } catch (e) {}
        try {
          const secure = location.protocol === 'https:' ? '; Secure' : '';
          document.cookie =
            LIFF_STATE_COOKIE +
            '=' +
            encodeURIComponent(s) +
            '; Path=/; Max-Age=900; SameSite=Lax' +
            secure;
        } catch (e) {}
      }

      function clearPersistedLiffState() {
        try {
          sessionStorage.removeItem(LIFF_STATE_KEY);
        } catch (e) {}
        try {
          localStorage.removeItem(LIFF_STATE_KEY);
        } catch (e) {}
        try {
          const secure = location.protocol === 'https:' ? '; Secure' : '';
          document.cookie = LIFF_STATE_COOKIE + '=; Path=/; Max-Age=0; SameSite=Lax' + secure;
        } catch (e) {}
      }

      function readLiffState() {
        let ctx = null;
        try {
          if (typeof liff.getAppContext === 'function') ctx = liff.getAppContext();
        } catch (e) {}
        const fromCtx = ctx && ctx.state;
        const fromUrl = liffStateFromUrl();
        const fromReferrer = liffStateFromLiffLineReferrer();
        let fromSs = null;
        let fromLs = null;
        try {
          fromSs = sessionStorage.getItem(LIFF_STATE_KEY);
        } catch (e) {}
        try {
          fromLs = localStorage.getItem(LIFF_STATE_KEY);
        } catch (e) {}
        const fromCookie = readStateCookie();
        return fromCtx || fromUrl || fromReferrer || fromSs || fromLs || fromCookie || '';
      }

      persistLiffState(liffStateFromUrl() || liffStateFromLiffLineReferrer());

      async function run() {
        try {
          /** true だと外部ブラウザログインになり state が落ちやすい。トーク内から開く場合は false 推奨 */
          await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: false });
        } catch (e) {
          show('<p class="status err">LIFF の初期化に失敗しました。LINEアプリ内で開いてください。</p>');
          return;
        }

        persistLiffState(readLiffState());

        if (!liff.isLoggedIn()) {
          const redirectUri = window.location.origin + window.location.pathname;
          try {
            liff.login({ redirectUri: redirectUri });
          } catch (e) {
            liff.login();
          }
          return;
        }

        const state = readLiffState();
        if (!state) {
          show(
            '<p class="status err">専用リンク（liff.state）が見つかりません。' +
              'トークに届いた <strong>liff.line.me で始まるURL</strong> から開いてください。' +
              'このページのURLをブラウザに直接貼り付けただけでは開けません。</p>'
          );
          return;
        }

        let idToken;
        try {
          idToken = liff.getIDToken();
        } catch (e) {
          show('<p class="status err">IDトークンを取得できません。LIFFアプリ設定で OpenID Connect・スコープ openid を有効にしてください。</p>');
          return;
        }

        if (!idToken) {
          show('<p class="status err">ログイン情報がありません。一度閉じて、トークのURLから再度お試しください。</p>');
          return;
        }

        try {
          const res = await fetch('/api/line/verify-dedicated', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken, t: state }),
          });
          const raw = await res.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch (e) {
            show(
              '<p class="status err">サーバー応答が不正です（HTTP ' +
                res.status +
                '）。Vercel の /api/line/verify-dedicated がデプロイされているか確認してください。</p>'
            );
            return;
          }
          if (!data.ok) {
            let msg =
              '<p class="status err">本人確認に失敗しました（' +
              escapeHtml(String(data.error || 'unknown')) +
              '）。</p>';
            if (data.error === 'missing_params') {
              msg +=
                '<p class="sub" style="margin-top:12px">Vercel の Production に <code>LINE_LOGIN_CHANNEL_ID</code>（LINEログインのチャネルID・数値）と <code>LINE_CHANNEL_SECRET</code> が入っているか確認してください。</p>';
            } else if (data.error === 'invalid_id_token') {
              msg +=
                '<p class="sub" style="margin-top:12px">' +
                escapeHtml(
                  data.hint ||
                    'LIFF で OpenID Connect を有効にし、スコープに openid と profile を付けてください。LINE_LOGIN_CHANNEL_ID は LIFF を作った LINEログインのチャネル ID（数値）です。'
                ) +
                '</p>';
              if (data.line_error) {
                msg +=
                  '<p class="sub" style="margin-top:10px;font-size:0.78rem;opacity:0.85">LINE: ' +
                  escapeHtml(String(data.line_error)) +
                  '</p>';
              }
            } else if (data.error === 'invalid_or_expired_link_token') {
              msg +=
                '<p class="sub" style="margin-top:12px">専用リンクの有効期限切れか、改ざんの可能性があります。ブロック解除後に再度友だち追加し、新しいメッセージのURLから開いてください。</p>';
            } else if (data.error === 'token_mismatch') {
              msg +=
                '<p class="sub" style="margin-top:12px">' +
                escapeHtml(
                  data.hint ||
                    '友だち追加時のユーザーIDと、LINEログインのユーザーIDが一致していません。LINE Developers で公式アカウントの紐付けを確認してください。'
                ) +
                '</p>';
              if (data.line_error) {
                msg +=
                  '<p class="sub" style="margin-top:10px;font-size:0.78rem;opacity:0.85">LINE: ' +
                  escapeHtml(String(data.line_error)) +
                  '</p>';
              }
            }
            show(msg);
            return;
          }
          clearPersistedLiffState();
          const pic = data.picture
            ? '<img class="avatar" src="' + data.picture.replace(/"/g, '') + '" alt="">'
            : '';
          show(
            pic +
              '<p class="status ok">ようこそ、' +
              (data.displayName ? escapeHtml(data.displayName) : 'お客様') +
              ' 様。専用リンクを確認しました。</p>' +
              '<p class="sub" style="margin-top:16px">このあと、ここにCSVダウンロードや詳細レポートを設置できます（別途API連携）。</p>'
          );
        } catch (e) {
          show('<p class="status err">サーバーと通信できませんでした。</p>');
        }
      }

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      run();
    })();
  </script>
</body>
</html>
