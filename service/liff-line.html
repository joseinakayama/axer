<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診断レポート（専用）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 40%, #0f172a 100%);
      color: #f8fafc;
      min-height: 100dvh;
      padding: 24px 20px 40px;
      line-height: 1.75;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px 22px;
      backdrop-filter: blur(12px);
    }
    h1 { font-size: 1.15rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
    .sub { font-size: 0.875rem; color: rgba(248,250,252,0.72); margin-bottom: 20px; }
    .status { font-size: 0.9rem; padding: 14px 16px; border-radius: 12px; margin-top: 16px; }
    .status.ok { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.35); color: #86efac; }
    .status.err { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .status.wait { background: rgba(255,255,255,0.06); color: rgba(248,250,252,0.85); }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2); margin-bottom: 12px;
    }
    .next { margin-top: 20px; font-size: 0.8rem; color: rgba(248,250,252,0.55); }
    a { color: #a5b4fc; }
    .diag-report { margin-top: 18px; }
    .diag-summary {
      margin-top: 12px;
      padding: 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.875rem;
    }
    .diag-url { word-break: break-all; margin-bottom: 8px; }
    .diag-total-num { font-size: 1.35rem; font-weight: 800; color: #a5b4fc; }
    .diag-grade { display: block; margin-top: 6px; font-size: 0.9rem; color: rgba(248,250,252,0.85); }
    .diag-meta { margin-top: 8px; font-size: 0.8rem; color: rgba(248,250,252,0.6); }
    .csv-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .csv-btn:active { opacity: 0.92; }
    .csv-btn.secondary {
      margin-top: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.12));
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .diag-note {
      margin-top: 12px;
      font-size: 0.72rem;
      color: rgba(248,250,252,0.5);
      line-height: 1.6;
    }
    .diag-csv-lead {
      margin-top: 14px;
      font-size: 0.85rem;
      color: rgba(248,250,252,0.78);
      line-height: 1.6;
    }
    .hint-storage { margin-top: 10px; }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- 相対パスだと /liff-line 等の Endpoint から開いたとき JS が別パスに解決され 404 になるため /service/ 固定 -->
  <script src="/service/line-liff-config.js"></script>
  <script src="/service/diagnosis-item-labels.js"></script>
  <script>
    (function () {
      if (typeof window.AXER_LIFF_ID !== 'string' || !String(window.AXER_LIFF_ID).trim()) {
        window.AXER_LIFF_ID = '2009774828-fLas1Ciw';
      }
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>診断レポート専用ページ</h1>
    <p class="sub">友だち追加時にお送りしたリンクからのみ、正しく開けます。</p>
    <div id="out"><p class="status wait">読み込み中…</p></div>
    <p class="next">ホームページ診断は <a href="/service/diagnosis.html">こちら</a> から実行できます。</p>
  </div>
  <script>
    (function () {
      const out = document.getElementById('out');
      const AXER_DIAG_STORAGE_KEY = 'axer_diagnosis_v1';
      const LIFF_ID =
        typeof window.AXER_LIFF_ID === 'string' ? window.AXER_LIFF_ID.trim() : '';

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function show(html) {
        out.innerHTML = html;
      }

      function loadStoredDiagnosis() {
        try {
          const raw = localStorage.getItem(AXER_DIAG_STORAGE_KEY);
          if (!raw) return null;
          const o = JSON.parse(raw);
          if (!o || !Array.isArray(o.items)) return null;
          return o;
        } catch (e) {
          return null;
        }
      }

      function numToMeta(categories) {
        const map = {};
        (categories || []).forEach(function (cat) {
          (cat.items || []).forEach(function (it) {
            map[it.num] = { category: cat.name, q: it.q, color: cat.color };
          });
        });
        return map;
      }

      function scoreLabel(score) {
        if (score === null || score === undefined) return '\u624b\u52d5\u78ba\u8a8d';
        if (score === 2) return '\u826f\u597d';
        if (score === 1) return '\u6ce8\u610f';
        return '\u8981\u6539\u5584';
      }

      function diagnosisGradeText(total) {
        if (total >= 80) return '\u512a\u79c0\uff01\u58f2\u308c\u308bHP\u3067\u3059';
        if (total >= 60) return '\u826f\u597d - \u3082\u3046\u5c11\u3057\u3067\u512a\u79c0\u30ec\u30d9\u30eb';
        if (total >= 40) return '\u6539\u5584\u306e\u4f59\u5730\u3042\u308a';
        return '\u8981\u6539\u5584 - \u512a\u5148\u7684\u306b\u5bfe\u7b56\u3057\u307e\u3057\u3087\u3046';
      }

      function csvCell(v) {
        const s = v == null ? '' : String(v);
        if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
        return s;
      }

      /** \u305d\u306e\u4eba\u5c02\u7528\u30ec\u30dd\u30fc\u30c8\uff08\u8868\u793a\u540d\u3092CSV\u5148\u982d\u3068\u30d5\u30a1\u30a4\u30eb\u540d\u306b\u53cd\u6620\uff09 */
      function buildPersonalDiagnosisCsv(diag, categories, viewerDisplayName) {
        const meta = numToMeta(categories);
        const nameRow = viewerDisplayName && String(viewerDisplayName).trim() ? String(viewerDisplayName).trim() : '\uff08\u672a\u767b\u9332\uff09';
        const rows = [];
        rows.push(['\u30db\u30fc\u30e0\u30da\u30fc\u30b8\u8a3a\u65ad\u30ec\u30dd\u30fc\u30c8\uff08\u5c02\u7528\u30ea\u30f3\u30af\u78ba\u8a8d\u6e08\u307f\uff09', '']);
        rows.push(['\u5bfe\u8c61\uff08LINE\u8868\u793a\u540d\uff09', nameRow]);
        rows.push(['CSV\u51fa\u529b\u65e5\u6642', new Date().toISOString()]);
        rows.push([]);
        rows.push(['No', '\u30ab\u30c6\u30b4\u30ea', '\u8a2d\u554f', '\u30b9\u30b3\u30a2(0-2)', '\u5224\u5b9a', '\u8a73\u7d30']);
        const sorted = diag.items.slice().sort(function (a, b) {
          return a.num - b.num;
        });
        sorted.forEach(function (i) {
          const m = meta[i.num] || {};
          rows.push([
            i.num,
            m.category || '',
            m.q || '',
            i.score == null ? '' : i.score,
            scoreLabel(i.score),
            i.detail || '',
          ]);
        });
        rows.push([]);
        rows.push(['\u8a3a\u65adURL', diag.url || '']);
        rows.push(['\u5408\u8a08\u70b9', diag.totalScore != null ? diag.totalScore : '']);
        rows.push([
          '\u8a3a\u65ad\u7d50\u679c\u4fdd\u5b58\u65e5\u6642',
          diag.savedAt ? new Date(diag.savedAt).toISOString() : '',
        ]);
        return rows
          .map(function (r) {
            return r.map(csvCell).join(',');
          })
          .join('\r\n');
      }

      function slugForFilename(name) {
        const s = String(name || '')
          .trim()
          .replace(/[\s\u3000]+/g, '_')
          .replace(/[\\/:*?"<>|#\u0000-\u001f]/g, '')
          .slice(0, 40);
        return s || 'guest';
      }

      function personalCsvBasename(diag, viewerDisplayName) {
        const host = (diag.url || '')
          .replace(/^https?:\/\//, '')
          .split('/')[0]
          .replace(/[^a-z0-9.-]/gi, '_') || 'site';
        return 'axer-shindan-tokutei-' + slugForFilename(viewerDisplayName) + '-' + host;
      }

      function renderDiagnosisBlock(diag, categories, viewerDisplayName) {
        let total = diag.totalScore;
        if (total == null) {
          total = 0;
          diag.items.forEach(function (i) {
            if (i.score != null) total += i.score;
          });
        }
        const grade = diagnosisGradeText(total);
        const urlEsc = diag.url ? escapeHtml(diag.url) : '\u2014';
        const who = viewerDisplayName && String(viewerDisplayName).trim() ? escapeHtml(viewerDisplayName.trim()) : '\u304a\u5ba2\u69d8';
        return (
          '<div class="diag-summary">' +
          '<p class="diag-url"><strong>URL</strong> ' +
          urlEsc +
          '</p>' +
          '<p class="diag-total"><strong>\u5408\u8a08</strong> <span class="diag-total-num">' +
          total +
          '</span> \u70b9 <span class="diag-grade">' +
          escapeHtml(grade) +
          '</span></p>' +
          (diag.autoCount != null
            ? '<p class="diag-meta">' +
              escapeHtml(String(diag.autoCount)) +
              ' \u9805\u76ee\u3092\u81ea\u52d5\u5224\u5b9a' +
              (diag.manualCount > 0
                ? ' / ' + diag.manualCount + ' \u9805\u76ee\u306f\u76ee\u8996\u78ba\u8a8d'
                : '') +
              '</p>'
            : '') +
          '</div>' +
          '<p class="diag-csv-lead">' +
          who +
          ' \u69d8\u5411\u3051\u306e<strong>\u516850\u9805\u76ee</strong>\u3092\u3001CSV\u30d5\u30a1\u30a4\u30eb1\u3064\u3067\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3067\u304d\u307e\u3059\uff08Excel\u5bfe\u5fdc\u306eUTF-8\uff09\u3002</p>' +
          '<button type="button" class="csv-btn" id="axerCsvBtn">\u5c02\u7528\u8a3a\u65ad\u30ec\u30dd\u30fc\u30c8\uff08CSV\uff09\u3092\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9</button>' +
          '<p class="diag-note">\u203bCSV\u5148\u982d\u306bLINE\u8868\u793a\u540d\u3068\u51fa\u529b\u65e5\u6642\u304c\u8a18\u9332\u3055\u308c\u307e\u3059\u3002KV\u672a\u63a5\u7d9a\u3067Safari\u3068LINE\u3092\u5206\u3051\u305f\u5834\u5408\u306f\u8a3a\u65ad\u304c\u5171\u6709\u3055\u308c\u306a\u3044\u3053\u3068\u304c\u3042\u308a\u307e\u3059\u3002\u540c\u3058LINE\u5185\u304b\u3089 <a href="/service/diagnosis.html">\u8a3a\u65ad\u30da\u30fc\u30b8</a> \u3092\u958b\u3044\u3066\u304f\u3060\u3055\u3044\u3002</p>'
        );
      }

      function resolveDiagnosisPayload(data) {
        const fromServer =
          data.diagnosis &&
          typeof data.diagnosis === 'object' &&
          Array.isArray(data.diagnosis.items) &&
          data.diagnosis.items.length > 0
            ? data.diagnosis
            : null;
        const fromLocal = loadStoredDiagnosis();
        const diag = fromServer || fromLocal;
        if (fromServer) {
          try {
            localStorage.setItem(AXER_DIAG_STORAGE_KEY, JSON.stringify(fromServer));
          } catch (e) {}
        }
        return diag;
      }

      function showVerifiedSuccess(data) {
        const pic = data.picture
          ? '<img class="avatar" src="' + data.picture.replace(/"/g, '') + '" alt="">'
          : '';
        const name = data.displayName ? data.displayName : '\u304a\u5ba2\u69d8';
        const diag = resolveDiagnosisPayload(data);
        const cats = window.AXER_DIAG_CATEGORIES || [];
        let reportHtml;
        if (diag && diag.items && diag.items.length > 0) {
          reportHtml =
            '<div class="diag-report">' + renderDiagnosisBlock(diag, cats, name) + '</div>';
        } else {
          reportHtml =
            '<div class="diag-report diag-report-empty">' +
            '<p class="status wait" style="text-align:left">\u8a3a\u65ad\u7d50\u679c\u304c\u307e\u3060\u3042\u308a\u307e\u305b\u3093\u3002\u4e0b\u306e\u30dc\u30bf\u30f3\u304b\u3089<strong>\u3053\u306eLINE\u5185\u306e\u30d6\u30e9\u30a6\u30b6</strong>\u3067\u8a3a\u65ad\u3092\u5b9f\u884c\u3057\u3001\u5206\u6790\u304c\u7d42\u308f\u3063\u305f\u3089<strong>\u53cb\u3060\u3061\u8ffd\u52a0\u6642\u306e\u5c02\u7528\u30ea\u30f3\u30af</strong>\u304b\u3089\u3082\u3046\u4e00\u5ea6\u3053\u306e\u30da\u30fc\u30b8\u3092\u958b\u3044\u3066\u304f\u3060\u3055\u3044\u3002\u5c02\u7528\u8a3a\u65ad\u30ec\u30dd\u30fc\u30c8\uff08CSV\uff09\u304c\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3067\u304d\u307e\u3059\u3002</p>' +
            '<button type="button" class="csv-btn secondary" id="axerOpenDiagnosisBtn">LINE\u5185\u3067\u30db\u30fc\u30e0\u30da\u30fc\u30b8\u8a3a\u65ad\u3092\u958b\u304f</button>' +
            '<p class="sub hint-storage">\u203b<strong>KV\u63a5\u7d9a\u306f\u5fc5\u9808\u3067\u306f\u3042\u308a\u307e\u305b\u3093\u3002</strong>\u4e0a\u306e\u30dc\u30bf\u30f3\u3067<strong>\u540c\u3058LINE\u5185</strong>\u3067\u8a3a\u65ad\u3057\u3001\u5c02\u7528\u30ea\u30f3\u30af\u3092\u3082\u3046\u4e00\u5ea6\u958b\u3051\u3070CSV\u307e\u3067\u884c\u3051\u307e\u3059\u3002KV\u3092\u3064\u306a\u3050\u3068\u3001Safari\u7b49\u3067\u8a3a\u65ad\u3057\u305f\u7d50\u679c\u3082\u3053\u306e\u30da\u30fc\u30b8\u306b\u8f09\u305b\u3089\u308c\u307e\u3059\uff08\u4efb\u610f\uff09\u3002</p>' +
            '</div>';
        }
        show(
          pic +
            '<p class="status ok">\u3088\u3046\u3053\u305d\u3001' +
            escapeHtml(name) +
            ' \u69d8\u3002\u5c02\u7528\u30ea\u30f3\u30af\u3092\u78ba\u8a8d\u3057\u307e\u3057\u305f\u3002</p>' +
            reportHtml
        );
        if (diag && diag.items && diag.items.length) {
          const btn = document.getElementById('axerCsvBtn');
          if (btn) {
            btn.addEventListener('click', function () {
              const csv = buildPersonalDiagnosisCsv(diag, cats, name);
              const bom = '\uFEFF';
              const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
              const a = document.createElement('a');
              const u = URL.createObjectURL(blob);
              a.href = u;
              a.download = personalCsvBasename(diag, name) + '.csv';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(u);
            });
          }
        } else {
          const openBtn = document.getElementById('axerOpenDiagnosisBtn');
          if (openBtn) {
            openBtn.addEventListener('click', function () {
              var diagUrl = window.location.origin + '/service/diagnosis.html';
              try {
                if (typeof liff !== 'undefined' && typeof liff.openWindow === 'function') {
                  liff.openWindow({ url: diagUrl });
                } else {
                  window.location.href = diagUrl;
                }
              } catch (e) {
                window.location.href = diagUrl;
              }
            });
          }
        }
      }

      if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') {
        show(
          '<p class="status err">LIFF ID が取得できません。<code>/service/line-liff-config.js</code> が 200 で読み込めているか、LINE の Endpoint URL とパスを確認してください。</p>'
        );
        return;
      }

      /**
       * liff.login() の OAuth 復帰でクエリが消える＋ sessionStorage が引き継がれない環境があるため、
       * sessionStorage / localStorage / Cookie（SameSite=Lax）の3経路で専用トークンを退避する。
       */
      const LIFF_STATE_KEY = 'axer_liff_state_v1';
      const LIFF_STATE_COOKIE = 'axer_liff_s';

      function liffStateFromUrl() {
        const q = new URLSearchParams(window.location.search).get('liff.state');
        if (q) return q;
        const h = window.location.hash || '';
        if (h.indexOf('liff.state=') === -1) return null;
        try {
          return new URLSearchParams(h.replace(/^#/, '')).get('liff.state');
        } catch (e) {
          return null;
        }
      }

      /** liff.line.me/{LIFF_ID}/{token} から Endpoint に入った直後、referrer にトークンが残ることがある */
      function liffStateFromLiffLineReferrer() {
        try {
          const ref = document.referrer;
          if (!ref || ref.indexOf('liff.line.me') === -1) return null;
          const u = new URL(ref);
          const segments = u.pathname.split('/').filter(Boolean);
          if (segments.length < 2) return null;
          const lid = String(LIFF_ID || '');
          if (segments[0] === lid) {
            return segments.slice(1).join('/');
          }
          const i = segments.indexOf(lid);
          if (i !== -1 && segments[i + 1]) {
            return segments.slice(i + 1).join('/');
          }
          return segments.slice(1).join('/');
        } catch (e) {
          return null;
        }
      }

      function readStateCookie() {
        try {
          const m = document.cookie.match(
            new RegExp('(?:^|; )' + LIFF_STATE_COOKIE.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)')
          );
          return m ? decodeURIComponent(m[1]) : null;
        } catch (e) {
          return null;
        }
      }

      function persistLiffState(s) {
        if (!s || typeof s !== 'string' || s.length < 1) return;
        try {
          sessionStorage.setItem(LIFF_STATE_KEY, s);
        } catch (e) {}
        try {
          localStorage.setItem(LIFF_STATE_KEY, s);
        } catch (e) {}
        try {
          const secure = location.protocol === 'https:' ? '; Secure' : '';
          document.cookie =
            LIFF_STATE_COOKIE +
            '=' +
            encodeURIComponent(s) +
            '; Path=/; Max-Age=900; SameSite=Lax' +
            secure;
        } catch (e) {}
      }

      function clearPersistedLiffState() {
        try {
          sessionStorage.removeItem(LIFF_STATE_KEY);
        } catch (e) {}
        try {
          localStorage.removeItem(LIFF_STATE_KEY);
        } catch (e) {}
        try {
          const secure = location.protocol === 'https:' ? '; Secure' : '';
          document.cookie = LIFF_STATE_COOKIE + '=; Path=/; Max-Age=0; SameSite=Lax' + secure;
        } catch (e) {}
      }

      function readLiffState() {
        let ctx = null;
        try {
          if (typeof liff.getAppContext === 'function') ctx = liff.getAppContext();
        } catch (e) {}
        const fromCtx = ctx && ctx.state;
        const fromUrl = liffStateFromUrl();
        const fromReferrer = liffStateFromLiffLineReferrer();
        let fromSs = null;
        let fromLs = null;
        try {
          fromSs = sessionStorage.getItem(LIFF_STATE_KEY);
        } catch (e) {}
        try {
          fromLs = localStorage.getItem(LIFF_STATE_KEY);
        } catch (e) {}
        const fromCookie = readStateCookie();
        return fromCtx || fromUrl || fromReferrer || fromSs || fromLs || fromCookie || '';
      }

      persistLiffState(liffStateFromUrl() || liffStateFromLiffLineReferrer());

      async function run() {
        try {
          /** true だと外部ブラウザログインになり state が落ちやすい。トーク内から開く場合は false 推奨 */
          await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: false });
        } catch (e) {
          show('<p class="status err">LIFF の初期化に失敗しました。LINEアプリ内で開いてください。</p>');
          return;
        }

        persistLiffState(readLiffState());

        if (!liff.isLoggedIn()) {
          const redirectUri = window.location.origin + window.location.pathname;
          try {
            liff.login({ redirectUri: redirectUri });
          } catch (e) {
            liff.login();
          }
          return;
        }

        const state = readLiffState();
        if (!state) {
          show(
            '<p class="status err">専用リンク（liff.state）が見つかりません。' +
              'トークに届いた <strong>liff.line.me で始まるURL</strong> から開いてください。' +
              'このページのURLをブラウザに直接貼り付けただけでは開けません。</p>'
          );
          return;
        }

        let idToken;
        try {
          idToken = liff.getIDToken();
        } catch (e) {
          show('<p class="status err">IDトークンを取得できません。LIFFアプリ設定で OpenID Connect・スコープ openid を有効にしてください。</p>');
          return;
        }

        if (!idToken) {
          show('<p class="status err">ログイン情報がありません。一度閉じて、トークのURLから再度お試しください。</p>');
          return;
        }

        let accessToken = '';
        try {
          accessToken = liff.getAccessToken() || '';
        } catch (e) {}

        try {
          const res = await fetch('/api/line/verify-dedicated', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken, t: state, accessToken }),
          });
          const raw = await res.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch (e) {
            show(
              '<p class="status err">サーバー応答が不正です（HTTP ' +
                res.status +
                '）。Vercel の /api/line/verify-dedicated がデプロイされているか確認してください。</p>'
            );
            return;
          }
          if (!data.ok) {
            let msg =
              '<p class="status err">本人確認に失敗しました（' +
              escapeHtml(String(data.error || 'unknown')) +
              '）。</p>';
            if (data.error === 'missing_params') {
              msg +=
                '<p class="sub" style="margin-top:12px">Vercel の Production に <code>LINE_LOGIN_CHANNEL_ID</code>（LINEログインのチャネルID・数値）と <code>LINE_CHANNEL_SECRET</code> が入っているか確認してください。</p>';
            } else if (data.error === 'invalid_id_token') {
              msg +=
                '<p class="sub" style="margin-top:12px">' +
                escapeHtml(
                  data.hint ||
                    'LIFF で OpenID Connect を有効にし、スコープに openid と profile を付けてください。LINE_LOGIN_CHANNEL_ID は LIFF を作った LINEログインのチャネル ID（数値）です。'
                ) +
                '</p>';
              if (data.line_error) {
                msg +=
                  '<p class="sub" style="margin-top:10px;font-size:0.78rem;opacity:0.85">LINE: ' +
                  escapeHtml(String(data.line_error)) +
                  '</p>';
              }
            } else if (data.error === 'invalid_or_expired_link_token') {
              msg +=
                '<p class="sub" style="margin-top:12px">専用リンクの有効期限切れか、改ざんの可能性があります。ブロック解除後に再度友だち追加し、新しいメッセージのURLから開いてください。</p>';
            } else if (data.error === 'token_mismatch') {
              msg +=
                '<p class="sub" style="margin-top:12px">' +
                escapeHtml(
                  data.hint ||
                    '友だち追加時のユーザーIDと、LINEログインのユーザーIDが一致していません。LINE Developers で公式アカウントの紐付けを確認してください。'
                ) +
                '</p>';
              if (data.line_error) {
                msg +=
                  '<p class="sub" style="margin-top:10px;font-size:0.78rem;opacity:0.85">LINE: ' +
                  escapeHtml(String(data.line_error)) +
                  '</p>';
              }
            }
            show(msg);
            return;
          }
          clearPersistedLiffState();
          showVerifiedSuccess(data);
        } catch (e) {
          show('<p class="status err">サーバーと通信できませんでした。</p>');
        }
      }

      run();
    })();
  </script>
</body>
</html>
